<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Front do CRUD</title>
</head>
<body>
    <main>
        <h1>Lista de Tarefas</h1>
            
            <div class="entrada">
                <section>
                    <label for="entrada">Insira uma tarefa</label>    
                    <input type="text" id="entrada">
                    <button onclick="salvarDados()">Adicionar</button>
                </section>
            </div>

            <section>
                <br>
                <div class="tarefas"><p>Suas tarefas:</p></div>
                <div id="editar"></div>
                <ul id="resultados"></ul>
            </section>

    </main>

    <script>
        function salvarDados() {
            let entrada = document.getElementById('entrada').value;
            if (!entrada.trim()) {
                alert("Digite uma tarefa");
                return;
                }
            fetch("http://localhost:3001/tarefas", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ texto: entrada })
            })
            .then(() => {
                document.getElementById('entrada').value = "";
                mostrar();
            });
        }

        function mostrar() {
            fetch("http://localhost:3001/tarefas", {
                method: "GET"
            })
            .then(res => res.json())
            .then(data => {
                let listaDeTarefas = data;

            let ul = document.getElementById('resultados');
            let html = "";

            listaDeTarefas.forEach((elemento) => {
                html += `<li>${elemento.texto} <button onclick="editar(${elemento.id})">Editar</button><button onclick="deletar(${elemento.id})">Deletar</button></li>`;
            });
            ul.innerHTML = html;
            });
        }

        function editar(id) {
            let html =  `<input type="text" id="textoparaeditar"><button onclick="editarDados(${id})">Salvar</button>`;
                let divEditar = document.getElementById('editar');
                divEditar.innerHTML = html;
        }

        function editarDados(id) {
            let textoParaEditar = document.getElementById('textoparaeditar').value;
                if (!textoParaEditar.trim()) {
                    alert("A tarefa não pode ficar vazia!");
                    return;
                    }
            fetch(`http://localhost:3001/tarefas/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ texto: textoParaEditar })
            })
            .then(() => {
                mostrar();
                document.getElementById('editar').innerHTML = "";
            });
        }

        function deletar(id) {
            fetch(`http://localhost:3001/tarefas/${id}`, {
                method: "DELETE"
            })
            .then(() => mostrar());
            document.getElementById('editar').innerHTML = "";
        }

        mostrar();
        
    </script>
    
    <footer>
        <div class="rodape">
            copyright &copy; Caio Fernandes
        </div>
    </footer>
</body>



</html>
